<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupplyWise - Register</title>
  <style>
    :root {
      --primary-color: #ff9900;
      --bg-gradient: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      --glass-bg: rgba(255, 255, 255, 0.65);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: #333;
    }

    .navbar {
      background-color: #131921;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      box-shadow: var(--shadow);
    }

    .navbar h1 {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      color: var(--primary-color);
      letter-spacing: 1px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--primary-color);
    }

    .container {
      max-width: 400px;
      margin: 80px auto;
      background-color: var(--glass-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #222;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #f19000;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }

    .alert-success {
      background-color: #d1f0d1;
      color: #1e4620;
    }

    .alert-error {
      background-color: #fcdede;
      color: #741c1c;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        margin-top: 10px;
      }

      .container {
        margin: 60px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <h1>SupplyWise</h1>
    <div class="nav-links">
      <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>

  <!-- Registration Form -->
  <div class="container">
    <h2>User Registration</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>

      <label for="role">Role:</label>
      <select id="role" name="role" required>
        <option value="supplier">Supplier</option>
        <option value="customer">Customer</option>
        <option value="transporter">Transporter</option>
        <option value="retailer">Retailer</option>
      </select>

      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">Phone:</label>
      <input type="text" id="phone" name="phone" pattern="[0-9]{10}" title="Phone number must be 10 digits" required>

      <label for="gstin">GSTIN (Optional):</label>
      <input type="text" id="gstin" name="gstin">

      <label for="address">Address (Optional):</label>
      <input type="text" id="address" name="address">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Register</button>
    </form>
  </div>

</body>
</html>
